# Example configuration for rucio-ds-generator
# CLI arguments override any value set here.
#
# Sensitive credentials (Rucio endpoints, OIDC client ID/secret) belong in
# .env — copy .env.template to .env and fill in real values.
# Precedence: CLI arg > environment variable (.env) > this file > defaults.

# Rucio scope for all DIDs
scope: "cms"

# RSE name to place files on (must be POSIX-mounted on this host)
rse: "T2_US_EXAMPLE"

# POSIX path to the RSE storage root on this host
rse_mount: "/mnt/rse/T2_US_EXAMPLE"

# Dataset DID name.
#
# Supports Jinja2 templates.  Available variables:
#   {{ date }}           UTC date, YYYYMMDD
#   {{ datetime }}       UTC datetime, YYYYMMDD_HHMMSS
#   {{ timestamp }}      UTC Unix timestamp (integer)
#   {{ run_id }}         12-char hex run identifier
#   {{ scope }}          Rucio scope
#   {{ rse }}            Target RSE name
#   {{ num_files }}      Number of files (integer)
#   {{ file_size }}      Human-readable file size using the selected unit system
#                        (e.g. 1GiB or 1GB depending on size_label; see below)
#   {{ file_size_iec }}  File size always in IEC binary units (e.g. 1GiB, 512MiB)
#   {{ file_size_si }}   File size always in SI decimal units (e.g. 1GB, 536MB)
#   {{ file_size_bytes}} Raw file size in bytes
#   {{ dataset_prefix }} Dataset prefix string
#
# Option A — static name (same dataset reused across runs; files are appended):
#   dataset_name: "my_test_dataset"
#
# Option B — template name:
#   dataset_name: "{{ dataset_prefix }}_{{ rse }}_{{ date }}"
#
# Option C — dynamic name (default; unique per run):
#   dataset_prefix defines the stem; final name is {prefix}_{YYYYMMDD}_{run_id}
dataset_prefix: "testdataset"
# dataset_name: ~

# File LFN prefix — final filename: {prefix}_{adler32hex}
# Also supports Jinja2 templates (same variables as dataset_name above,
# except dataset_prefix). Note: {{ timestamp }} is evaluated once at
# startup and cached for the entire run, so all files share the same prefix.
file_prefix: "testfile"
# file_prefix: "{{ scope }}_{{ file_size }}_test"

# Number of files to generate per run
num_files: 10

# Size of each generated file.
# Accepts a raw integer (bytes) or a human-readable string.
# SI units (decimal, powers of 1000): KB = 10³, MB = 10⁶, GB = 10⁹, TB = 10¹², PB = 10¹⁵
# IEC units (binary, powers of 1024): KiB = 1024, MiB = 1024², GiB = 1024³, TiB = 1024⁴
# Bare letters (K, M, G, T, P) are treated as binary (IEC).
# Examples: 1073741824  1GiB  512MiB  1GB  512MB  2TiB  500GB
file_size_bytes: 1GiB

# Pool A: file generation thread count (CPU/IO bound)
threads: 4

# Replication rule lifetime in seconds. Omit or set to null for a permanent rule.
# Examples: 604800 = 7 days, 2592000 = 30 days
rule_lifetime: ~

# Staging directory for file creation.  Files are written here first, then
# moved to the RSE.  May be on a different filesystem from rse_mount (a
# shutil.copy2 + os.rename sequence is used automatically in that case).
# Default: system temp dir (tempfile.gettempdir()).
# staging_dir: /scratch/rucio-staging

# Path prefix that Rucio uses for this RSE's PFNs.  If Rucio returns PFNs
# like /data/rucio/cms/ab/cd/file but the RSE is mounted at /mnt/rse, set:
#   rse_pfn_prefix: /data/rucio
#   rse_mount:      /mnt/rse
# The tool strips rse_pfn_prefix and prepends rse_mount to get the local path.
# Omit (or null) if Rucio already returns paths that are valid locally.
# rse_pfn_prefix: ~

# RSE file ownership.  Omit (or set to null) to keep the process's own uid/gid.
# Set these when the Rucio storage account has a different uid/gid than the user
# running this tool, e.g. when running as root and writing files owned by rucio.
# The tool will also chown any intermediate hash directories it creates.
# rse_uid: 1000
# rse_gid: 1000

# Container DID name.  If set, each generated dataset is attached to this
# Rucio container after a successful run.  The container is created
# automatically if it does not already exist.  Attaching a dataset that is
# already a member of the container is silently ignored (safe to re-run).
# Supports the same Jinja2 template variables as dataset_name.
# Omit (or set to null) to skip container attachment entirely.
# container_name: "my_test_container"
# container_name: "{{ scope }}_{{ rse }}_tests"

# Global dataset registry.  After each successful run the dataset DID, RSE,
# rule ID, and cumulative file count are written here.  Set to empty string or
# null to disable registry recording entirely.
# Default: ~/.rucio-ds-generator/registry.json
# registry_file: ~/.rucio-ds-generator/registry.json

# File-generation back-end.
# csprng (default): streaming pseudo-random data via the fastest available stdlib
#   PRNG (random.randbytes on Python 3.9+, os.urandom on 3.6-3.8).  PRNG-limited.
# buffer-reuse: pre-fills a fixed ring buffer with random data once at startup.
#   Each chunk write picks a random start offset in the ring — no PRNG per chunk.
#   Write throughput becomes disk/memory-bandwidth-limited rather than PRNG-limited.
#   Configure the ring size with buffer_reuse_ring_size below.
# generation_mode: csprng

# Ring buffer size for buffer-reuse mode.
# Accepts a raw integer (bytes) or a human-readable string.
# Must be >= 128 MiB (the chunk size).  Larger values provide greater data variety.
# Memory footprint: N workers × (ring_size + 128 MiB).  At 4 workers + 512 MiB ≈ 2.5 GiB.
# SI units (decimal):  KB = 10³, MB = 10⁶, GB = 10⁹
# IEC units (binary): KiB = 1024, MiB = 1024², GiB = 1024³
# Examples: 512MiB (default), 1GiB, 2GiB
# buffer_reuse_ring_size: 512MiB

# Unit system used for the {{ file_size }} Jinja2 template variable in dataset
# and file prefix names.
#   iec (default): binary powers of 1024 — KiB, MiB, GiB, TiB, PiB
#   si:            decimal powers of 1000 — KB,  MB,  GB,  TB,  PB
# Note: {{ file_size_iec }} and {{ file_size_si }} are always available in
# templates regardless of this setting, so you can mix both in a single name:
#   dataset_name: "{{ dataset_prefix }}_{{ file_size_si }}_{{ date }}"
# size_label: iec

# Write XrdCks adler32 extended attribute (user.XrdCks.adler32) to each placed
# file after placement.  XRootD reads this attribute for checksum validation,
# avoiding a full re-read of the file.  The already-computed adler32 is reused
# (no extra I/O).  Silently skipped on platforms without os.setxattr (macOS,
# Windows).  Set to false or pass --no-xattr to disable.
# xattr: true

# ---- 100 k-file scale performance tuning ------------------------------------
#
# These three parameters are primarily relevant when generating very large file
# counts (10 k+).  The defaults are conservative and safe for all run sizes.

# imap task batch size sent to each Pool A worker per IPC round-trip.
# 0 (default): auto-computed as max(1, num_files // (threads * 4)), which keeps
#   each worker's queue topped up without pre-loading so many tasks that progress
#   reporting becomes coarse.
# Increase for large file counts (> 10 k) if IPC overhead appears in profiles.
# pool_chunksize: 0

# Number of LFNs resolved per lfns2pfns Rucio API call.
# 0: resolve all LFNs in a single call (lowest HTTP round-trip count).
# Default: 1000 — balances round-trip count against per-call latency on slow servers.
# pfn_batch_size: 1000

# Number of state.update() calls between state-file disk writes.
# 1 (fully synchronous): writes on every update — safest; slowest at 100 k files.
# 100 (default): one disk write per 100 updates — good balance of safety and speed.
# Higher values reduce I/O but risk losing more progress on a hard crash.
# state_flush_interval: 100

# Logging level: DEBUG, INFO, WARNING, ERROR
log_level: "INFO"
