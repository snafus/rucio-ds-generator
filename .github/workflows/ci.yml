name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-rocky8:
    name: Test suite (Rocky Linux 8 / Python 3.6)
    runs-on: ubuntu-latest
    container:
      image: rockylinux:8

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          dnf install -y python3 python3-pip python3-devel gcc git

      - name: Upgrade pip
        run: python3 -m pip install --upgrade "pip<22" "setuptools>=42,<59" wheel
        # pip 22+ and setuptools 59+ dropped Python 3.6 support

      - name: Install package and test dependencies
        run: python3 -m pip install -e ".[test]"

      - name: Run tests
        run: python3 -m pytest tests/ -v --tb=short

  test-rocky9:
    name: Test suite (Rocky Linux 9 / Python 3.9)
    runs-on: ubuntu-latest
    container:
      image: rockylinux:9

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          dnf install -y python3 python3-pip python3-devel gcc git

      - name: Upgrade pip
        run: python3 -m pip install --upgrade pip setuptools wheel

      - name: Install package and test dependencies
        run: python3 -m pip install -e ".[test]"

      - name: Run tests
        run: python3 -m pytest tests/ -v --tb=short

  test-matrix:
    name: Test suite (ubuntu / Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.13"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Upgrade pip
        run: pip install --upgrade pip setuptools wheel

      - name: Install package and test dependencies
        # Install runtime deps via the package, then install a current pytest
        # separately — pyproject.toml pins pytest<7 for Python 3.6 compat but
        # that constraint is not needed here.
        run: pip install -e . && pip install pytest

      - name: Run tests
        run: pytest tests/ -v --tb=short
